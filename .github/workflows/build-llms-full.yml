name: build llms-full.txt

# Mantem o llms-full.txt (artefato derivado = indice + todos os SKILL.md) sempre
# em sincronia com as skills. Roda a cada push que toca skills/, llms.txt ou o
# gerador, regenera, e commita de volta SO se houver mudanca (evita loop).
on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'llms.txt'
      - 'scripts/build-llms-full.sh'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate llms-full.txt
        run: bash scripts/build-llms-full.sh
      - name: Commit if changed
        run: |
          if ! git diff --quiet -- llms-full.txt; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add llms-full.txt
            git commit -m "chore: regenerate llms-full.txt [skip ci]"
            git push
          else
            echo "llms-full.txt ja esta atualizado."
          fi
